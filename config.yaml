model: "ollama/odytrice/gemma4:4090-26b"
# model: "openai/gpt-5.6-luna"
retrieve_model: "ollama_chat/odytrice/gemma4:4090-26b"  # defaults to `model` if not set
toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "no"
if_add_doc_description: "yes"
if_add_node_text: "no"
llm_concurrency: 1  # max concurrent async LLM calls (asyncio.gather); local single-GPU
                    # backends serve one request at a time, so anything above 1 just
                    # queues requests behind each other until they exceed llm_timeout
llm_timeout: 1800   # seconds, per LLM call
llm_max_retries: 3  # give up after this many attempts instead of retrying a slow/stuck
                    # backend for hours (was hardcoded to 10, i.e. up to 10*llm_timeout)